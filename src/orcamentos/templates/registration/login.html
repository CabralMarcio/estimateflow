<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Login - EstimateFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="container py-5" style="max-width: 420px;">
    <h1 class="h3 mb-3">EstimateFlow</h1>
    <p class="text-muted">Sign in to continue</p>

    {% if form.errors %}
      <div class="alert alert-danger py-2">
        Invalid credentials. Please try again.
      </div>
    {% endif %}

    <form method="post" class="card card-body">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label" for="id_username">Username</label>
        <input class="form-control" type="text" name="username" autofocus required id="id_username">
      </div>
      <div class="mb-3">
        <label class="form-label" for="id_password">Password</label>
        <input class="form-control" type="password" name="password" required id="id_password">
      </div>

      <input type="hidden" name="next" value="{{ next }}">

      <button class="btn btn-primary w-100" type="submit">Login</button>
    </form>
  </body>
</html>
